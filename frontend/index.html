<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Site web officiel de l'Église TDV : programmes, événements, galerie média et contact." />

    <title>ETDV - Temple du Dieu Vivant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Meta tags pour améliorer le rendu sur mobile -->
    <meta name="theme-color" content="#0ea5e9" id="theme-color" />
    <meta name="color-scheme" content="light dark" />
    
    <style>
      /* Empêcher le flash du mauvais thème au chargement */
      html {
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      
      html.theme-ready {
        visibility: visible;
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Script pour appliquer le thème avant le rendu React -->
    <script>
      (function() {
        try {
          // Récupérer le thème sauvegardé
          const savedTheme = localStorage.getItem('theme');
          
          // Récupérer la préférence système
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          
          // Déterminer le thème à appliquer
          if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-color')?.setAttribute('content', '#1e293b');
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.setAttribute('data-theme', 'corporate');
            document.getElementById('theme-color')?.setAttribute('content', '#0ea5e9');
          }
        } catch (e) {
          console.error('Erreur lors de l\'application du thème:', e);
        } finally {
          // Marquer le HTML comme prêt
          document.documentElement.classList.add('theme-ready');
        }
      })();
    </script>
  </body>
</html>
